# =============================================================================
# Secrets — Database Credentials
# =============================================================================
# Template secret — the deploy script replaces PLACEHOLDER values.
# In production, use External Secrets Operator or Sealed Secrets instead.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: unleash-db-credentials
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: unleash
type: Opaque
stringData:
  # --- These values are populated by the deploy script ---
  host: "CLOUDSQL_PRIVATE_IP"       # Private IP of Cloud SQL instance
  port: "5432"
  database: "unleash"
  username: "unleash"
  password: "GENERATED_PASSWORD"     # Auto-generated by deploy script
  # Full connection string (used by some configurations)
  database-url: "postgresql://unleash:GENERATED_PASSWORD@CLOUDSQL_PRIVATE_IP:5432/unleash"
---
# =============================================================================
# Also create the same secret in the KCC namespace for SQLUser reference
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: unleash-db-credentials
  namespace: unleash-system
  labels:
    app.kubernetes.io/name: unleash
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: unleash
type: Opaque
stringData:
  password: "GENERATED_PASSWORD"     # Must match the password above
