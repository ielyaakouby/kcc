# =============================================================================
# Unleash Edge — Deployment + ServiceAccount
# =============================================================================
# High-performance proxy between SDKs and Unleash server.
# Requires an API token from Unleash to authenticate.
# Image: unleashorg/unleash-edge
# Port: 3063
# =============================================================================

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: unleash-edge-sa
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash-edge
    app.kubernetes.io/part-of: unleash

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: unleash-edge
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash-edge
    app.kubernetes.io/part-of: unleash
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: unleash-edge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: unleash-edge
        app.kubernetes.io/part-of: unleash
    spec:
      serviceAccountName: unleash-edge-sa

      containers:
        - name: unleash-edge
          image: unleashorg/unleash-edge:latest
          args: ["edge"]
          ports:
            - name: http
              containerPort: 3063
              protocol: TCP

          env:
            # ── Upstream Unleash server (ClusterIP) ──
            - name: UPSTREAM_URL
              value: "http://unleash.unleash.svc.cluster.local:4242"

            # ── API tokens (comma-separated) ──
            # Replace EDGE_API_TOKEN with a real token from Unleash
            # Create one in Unleash → Admin → API access → Add new API key
            #   Type: Client  |  Environment: production
            - name: TOKENS
              valueFrom:
                secretKeyRef:
                  name: unleash-edge-token
                  key: tokens

            # ── Enable streaming for real-time updates ──
            - name: STREAMING
              value: "true"

            # ── Logging ──
            - name: RUST_LOG
              value: "warn,unleash_edge=info"

            # ── Backup folder (in-pod cache) ──
            - name: BACKUP_FOLDER
              value: "/tmp/unleash-edge-backup"

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12

          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5

          volumeMounts:
            - name: edge-backup
              mountPath: /tmp/unleash-edge-backup

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false

      volumes:
        - name: edge-backup
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values: ["unleash-edge"]
                topologyKey: kubernetes.io/hostname
