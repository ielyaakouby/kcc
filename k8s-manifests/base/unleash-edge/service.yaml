# =============================================================================
# Unleash Edge — Service + HPA
# =============================================================================

---
# --- ClusterIP Service ---
apiVersion: v1
kind: Service
metadata:
  name: unleash-edge
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash-edge
    app.kubernetes.io/part-of: unleash
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: unleash-edge
  ports:
    - name: http
      port: 3063
      targetPort: http
      protocol: TCP

---
# --- HPA ---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: unleash-edge
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash-edge
    app.kubernetes.io/part-of: unleash
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: unleash-edge
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
