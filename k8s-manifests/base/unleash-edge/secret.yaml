# =============================================================================
# Secret — Unleash Edge Token
# =============================================================================
# Placeholder token for Edge ↔ Unleash Server authentication.
# After deployment, create a real API token in Unleash UI:
#   Admin → API access → New API key (Type: Client, Env: production)
# Then update this secret with the real token value.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: unleash-edge-token
  namespace: unleash
  labels:
    app.kubernetes.io/name: unleash-edge
    app.kubernetes.io/component: edge
    app.kubernetes.io/part-of: unleash
type: Opaque
stringData:
  tokens: "*:production.placeholder-replace-me-with-real-token"
