# =============================================================================
# PROD/unleash — High availability, production resources, TLS
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

patches:
  # ── Unleash: 3 replicas, high resources, TLS ingress ──
  - target:
      kind: Deployment
      name: unleash
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 1Gi
  - target:
      kind: HorizontalPodAutoscaler
      name: unleash
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 8
  - target:
      kind: Ingress
      name: unleash
    patch: |
      - op: add
        path: /metadata/annotations/networking.gke.io~1managed-certificates
        value: unleash-cert
      - op: add
        path: /spec/rules
        value:
          - host: unleash.example.com
            http:
              paths:
                - path: /*
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: unleash
                      port:
                        number: 4242

  # ── Edge: 3 replicas, high resources ──
  - target:
      kind: Deployment
      name: unleash-edge
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
  - target:
      kind: HorizontalPodAutoscaler
      name: unleash-edge
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15
