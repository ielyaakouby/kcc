# =============================================================================
# STAGING/unleash — Moderate replicas, staging hostname
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

patches:
  # ── Unleash: 2 replicas, staging ingress ──
  - target:
      kind: Deployment
      name: unleash
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: unleash
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 4
  - target:
      kind: Ingress
      name: unleash
    patch: |
      - op: add
        path: /spec/rules
        value:
          - host: unleash-staging.example.com
            http:
              paths:
                - path: /*
                  pathType: ImplementationSpecific
                  backend:
                    service:
                      name: unleash
                      port:
                        number: 4242

  # ── Edge: 2 replicas ──
  - target:
      kind: Deployment
      name: unleash-edge
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: HorizontalPodAutoscaler
      name: unleash-edge
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 6
