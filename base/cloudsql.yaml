# =============================================================================
# CloudSQL PostgreSQL — Instance, Database & User
# =============================================================================
# Provisions a Cloud SQL PostgreSQL 15 instance with private IP,
# plus the `unleash` database and user.
# =============================================================================

---
# --- Cloud SQL Instance ---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: unleash-db-instance
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
  annotations:
    cnrm.cloud.google.com/deletion-policy: "abandon"  # Safety: don't delete DB on manifest removal
spec:
  databaseVersion: POSTGRES_15
  region: europe-west1
  settings:
    tier: db-custom-1-3840           # 1 vCPU, 3.75 GB RAM — adjust for production
    edition: ENTERPRISE
    availabilityType: ZONAL          # Change to REGIONAL for HA in production
    diskType: PD_SSD
    diskSize: 20                     # GB — auto-resize is enabled
    diskAutoresize: true
    diskAutoresizeLimit: 100         # Max 100 GB

    ipConfiguration:
      ipv4Enabled: false             # No public IP
      privateNetworkRef:
        external: "projects/aghouchaf/global/networks/unleash-vpc"
      requireSsl: false              # Set to true if using SSL

    backupConfiguration:
      enabled: true
      startTime: "02:00"             # UTC
      pointInTimeRecoveryEnabled: true
      transactionLogRetentionDays: 7
      backupRetentionSettings:
        retainedBackups: 14
        retentionUnit: COUNT

    maintenanceWindow:
      day: 7                         # Sunday
      hour: 4                        # 04:00 UTC
      updateTrack: stable

    databaseFlags:
      - name: max_connections
        value: "100"
      - name: log_checkpoints
        value: "on"
      - name: log_connections
        value: "on"
      - name: log_disconnections
        value: "on"

    insightsConfig:
      queryInsightsEnabled: true
      queryStringLength: 1024
      recordApplicationTags: true
      recordClientAddress: true

---
# --- Database ---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLDatabase
metadata:
  name: unleash
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
spec:
  instanceRef:
    name: unleash-db-instance
  charset: UTF8
  collation: en_US.UTF8

---
# --- Database User ---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLUser
metadata:
  name: unleash
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
spec:
  instanceRef:
    name: unleash-db-instance
  type: BUILT_IN
  password:
    valueFrom:
      secretKeyRef:
        name: unleash-db-credentials
        key: password
