# =============================================================================
# Istio (Anthos Service Mesh) — via KCC GKE Hub
# =============================================================================
# Installs managed Istio/ASM declaratively via Config Connector:
#   1. GKEHubMembership  — Register cluster to Fleet
#   2. GKEHubFeature     — Enable servicemesh fleet feature
#   3. GKEHubFeatureMembership — Enable automatic mesh on the cluster
# =============================================================================

---
# --- Register GKE cluster to Fleet ---
apiVersion: gkehub.cnrm.cloud.google.com/v1beta1
kind: GKEHubMembership
metadata:
  name: unleash-cluster-membership
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
    app.kubernetes.io/component: mesh
spec:
  location: global
  authority:
    issuer: "https://container.googleapis.com/v1/projects/__PROJECT_ID__/locations/__REGION__/clusters/unleash-cluster"
  endpoint:
    gkeCluster:
      resourceRef:
        external: "projects/__PROJECT_ID__/locations/__REGION__/clusters/unleash-cluster"

---
# --- Enable Service Mesh Fleet Feature ---
apiVersion: gkehub.cnrm.cloud.google.com/v1beta1
kind: GKEHubFeature
metadata:
  name: servicemesh
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
    app.kubernetes.io/component: mesh
spec:
  location: global
  projectRef:
    external: "projects/__PROJECT_ID__"
  resourceID: servicemesh

---
# --- Enable Automatic Mesh Management on the Cluster ---
apiVersion: gkehub.cnrm.cloud.google.com/v1beta1
kind: GKEHubFeatureMembership
metadata:
  name: unleash-cluster-mesh
  namespace: unleash-system
  labels:
    app.kubernetes.io/part-of: unleash
    app.kubernetes.io/managed-by: kcc
    app.kubernetes.io/component: mesh
spec:
  projectRef:
    external: "projects/__PROJECT_ID__"
  location: global
  membershipLocation: global
  membershipRef:
    name: unleash-cluster-membership
  featureRef:
    name: servicemesh
  mesh:
    management: MANAGEMENT_AUTOMATIC
